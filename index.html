<!DOCTYPE html>
<html lang="mr-IN">
<head>
    <meta charset="UTF-8">
    <title>MS Digital Store | Best Tech Deals</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* ... तुमची जुनी CSS ... */
        :root { --primary: #facc15; --amazon-orange: #ff9900; --dark: #0f172a; --light: #f8fafc; --shadow: 0 4px 12px rgba(0,0,0,0.08); }
        body { font-family: 'Inter', sans-serif; margin:0; background: var(--light); color: #1e293b; }
        header { background: var(--dark); color:white; padding:40px 20px; text-align:center; }
        header h1 { margin: 0; color: var(--primary); }
        .container { width:92%; max-width:1200px; margin:30px auto; }
        .product-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:25px; }
        .card { background:white; padding:15px; border-radius:16px; box-shadow: var(--shadow); text-align: center; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { max-width: 100%; height: 180px; object-fit: contain; }
        .price { font-size: 1.4rem; font-weight: 800; color: #b91c1c; margin: 10px 0; }
        
        /* Pagination Buttons Style */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 40px; }
        .page-btn { padding: 10px 25px; background: var(--dark); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .page-btn:disabled { background: #cbd5e1; cursor: not-allowed; }
        .page-info { font-weight: bold; font-size: 1.1rem; }

        /* Modal Styles */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index: 1001; backdrop-filter: blur(4px); }
        .modal-content { background:white; width:90%; max-width:600px; margin:50px auto; padding:30px; border-radius:20px; position:relative; text-align: center; }
        .close { position:absolute; right:20px; top:15px; font-size:28px; cursor:pointer; }
        .btn-amazon { display:block; padding:16px; background: var(--amazon-orange); color:white; text-decoration:none; border-radius:10px; margin-top:20px; font-weight:bold; }
    </style>
</head>
<body>

<header>
    <h1>MS Digital Store</h1>
    <p>Premium Tech Products • Verified Deals</p>
</header>

<div class="container">
    <div class="product-grid" id="products"></div>

    <div class="pagination">
        <button id="prevBtn" class="page-btn" onclick="prevPage()">Previous</button>
        <span class="page-info" id="pageInfo">Page 1</span>
        <button id="nextBtn" class="page-btn" onclick="nextPage()">Next</button>
    </div>
</div>

<div class="modal" id="productModal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <div id="modalData"></div>
    </div>
</div>

<script>
const products = [
    { id:1, name:"Sony Digital Camera", price:153990, category:"camera", image:"sony camera.jpg.webp", desc:"Professional photography camera.", affiliate:"https://amzn.to/4s8VcbX" },
    { id:2, name:"Boat Airbuds", price:2499, category:"audio", image:"airbuds.jpg", desc:"Hybrid ANC earbuds.", affiliate:"https://amzn.to/3OGT64L" },
    { id:3, name:"Apple AirPods", price:23990, category:"audio", image:" apple airpods.jpg", desc:"Premium sound.", affiliate:"https://amzn.to/3OBvBKx" },
    { id:4, name:"Mobile Charging Cable", price:999, category:"accessories", image:"charge.jpg", desc:"Fast charging cable.", affiliate:"https://amzn.to/4rFiTsz" },
    { id:5, name:" Laptop ", price:68990, category:"laptop", image:"hp laptop.jpg", desc:" HP Smartchoice OmniBook 5.", affiliate:"https://amzn.to/4aI8Q04" },
    { id:6, name:"Counter Machine", price:15998, category:"computer", image:"counter.jpg ", desc:"Currency counting machine.", affiliate:"https://amzn.to/4aGM4Wl" },
    { id:7, name:"Pen Drive ", price:2100, category:"computer", image:" sandisk 1.jpg ", desc:"SanDisk Ultra Dual Drive Luxe.", affiliate:"https://amzn.to/46wnd52" },
    { id:8, name:"Canon EOS R50", price:64990, category:"camera", image:" canon.jpg", desc:"Mirrorless camera.", affiliate:"https://amzn.to/4bcVp8l" },
    { id:9, name:"boAt Nirvana Crown", price:2799, category:"audio", image:"boats airbords.jpg", desc:"Spatial audio headphones.", affiliate:"https://amzn.to/400HZ9m" },
    { id:10, name:"Amazfit Active Max", price:15999, category:"watch", image:"smart watch.jpg", desc:"AMOLED Smartwatch.", affiliate:"https://amzn.to/4cmxWms" },
    { id:11, name:"RO Water Purifier", price:22200, category:"smart", image:"A.jpg ", desc:"KENT Sterling Star RO.", affiliate:"https://amzn.to/4ckumJx" },
    { id:12, name:"Smart Monitor", price:32999, category:"computer", image:"B.jpg ", desc:"UltraWide Monitor.", affiliate:"https://amzn.to/3P9GCTl" },
    { id:13, name:"Noise Pro 6R", price:6999, category:"watch", image:" c.jpg ", desc:"AMOLED GPS watch.", affiliate:"https://amzn.to/3P914nm" },
    { id:14, name:"GUESS Men’s Watch", price:16995, category:"watch", image:"d.jpg", desc:"Elegant luxury timepiece.", affiliate:"https://amzn.to/4saLOEW" },
    { id:15, name:"Antique Wall Clock", price:699, category:"smart", image:"e.jpg ", desc:"Luxury Wall Clock.", affiliate:"https://amzn.to/4u52MGn" },
    { id:16, name:"Fire Boltt Aero TWS", price:799, category:"audio", image:"f.jpg", desc:"Gaming earbuds.", affiliate:"https://amzn.to/4tXBtxH" },
    { id:17, name:"Laptop Stand", price:497, category:"laptop", image:" g.jpg ", desc:"Mini Metal Laptop Stand.", affiliate:"https://amzn.to/3OFZycl" },
    { id:18, name:"Sony Alpha 6100", price:72499, category:"camera", image:"aa.jpg", desc:"Mirrorless Camera.", affiliate:"https://amzn.to/40EuCvG" },
    { id:19, name:"IZI IRIS Pocket Gimbal", price:24499, category:"camera", image:"aaa.jpg ", desc:"4K Pocket Gimbal.", affiliate:"https://amzn.to/4rMp7qQ" }
];

let currentPage = 1;
const productsPerPage = 8;

function displayProducts() {
    const container = document.getElementById("products");
    container.innerHTML = "";
    
    // Pagination Logic
    const startIndex = (currentPage - 1) * productsPerPage;
    const endIndex = startIndex + productsPerPage;
    const paginatedItems = products.slice(startIndex, endIndex);

    paginatedItems.forEach(p => {
        container.innerHTML += `
        <div class="card" onclick="openProduct(${p.id})">
            <img src="${p.image}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/200'">
            <h3>${p.name}</h3>
            <p class="price">₹${p.price.toLocaleString('en-IN')}</p>
            <button class="page-btn" style="width:100%">View Details</button>
        </div>`;
    });

    // Update Buttons & Info
    document.getElementById("pageInfo").innerText = `Page ${currentPage}`;
    document.getElementById("prevBtn").disabled = currentPage === 1;
    document.getElementById("nextBtn").disabled = endIndex >= products.length;
}

function nextPage() {
    if ((currentPage * productsPerPage) < products.length) {
        currentPage++;
        displayProducts();
        window.scrollTo({top: 0, behavior: 'smooth'});
    }
}

function prevPage() {
    if (currentPage > 1) {
        currentPage--;
        displayProducts();
        window.scrollTo({top: 0, behavior: 'smooth'});
    }
}

function openProduct(id){
    const product = products.find(p => p.id === id);
    document.getElementById("modalData").innerHTML=`
        <img src="${product.image}" style="max-width:200px; border-radius:12px;">
        <h2>${product.name}</h2>
        <p class="price">₹${product.price.toLocaleString('en-IN')}</p>
        <p>${product.desc}</p>
        <a class="btn-amazon" href="${product.affiliate}" target="_blank">View on Amazon</a>
    `;
    document.getElementById("productModal").style.display="block";
}

function closeModal(){ document.getElementById("productModal").style.display="none"; }

// Initial Display
displayProducts();

window.onclick = function(event) { if (event.target == document.getElementById("productModal")) closeModal(); }
</script>
</body>
</html>
