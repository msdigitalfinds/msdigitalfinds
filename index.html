<!DOCTYPE html>
<html lang="mr-IN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS Digital Store | Premium Tech Deals</title>
    
    <meta name="description" content="MS Digital Store वर सर्वोत्तम टेक डील्स मिळवा. कॅमेरा, लॅपटॉप आणि स्मार्ट वॉचेसवर विशेष सवलत.">
    <meta name="keywords" content="Tech Deals, Amazon Affiliate, MS Digital, Gadgets, Laptops, Cameras">
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Store",
      "name": "MS Digital Store",
      "description": "Best curated tech products from Amazon."
    }
    </script>

    <script async src="https://www.googletagmanager.com/gtag/js?id=YOUR-ID"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'YOUR-ID');
    </script>

    <style>
        :root { --primary: #facc15; --amazon: #ff9900; --dark: #0f172a; --light: #f8fafc; }
        body { font-family: 'Inter', sans-serif; margin:0; background: var(--light); color: #1e293b; }
        header { background: var(--dark); color:white; padding:30px; text-align:center; }
        .container { width:92%; max-width:1200px; margin:20px auto; }
        
        /* Product Grid */
        .product-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(250px, 1fr)); gap:20px; }
        .card { background:white; padding:15px; border-radius:15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; text-align:center; transition: 0.3s; position: relative;}
        .card:hover { transform: translateY(-5px); }
        .card img { max-width: 100%; height: 180px; object-fit: contain; }
        .price { font-size: 1.3rem; font-weight: 800; color: #b91c1c; }
        
        /* Full Product View (Amazon Style) */
        #single-product-page { display:none; background:white; min-height:100vh; padding:20px; }
        .product-layout { display: flex; flex-wrap: wrap; gap: 40px; margin-top: 20px; }
        .product-image-box { flex: 1; min-width: 300px; text-align: center; }
        .product-image-box img { max-width: 100%; border-radius: 20px; }
        .product-info-box { flex: 1; min-width: 300px; }
        
        /* UI Elements */
        .btn { padding: 12px 25px; border-radius: 8px; border:none; cursor:pointer; font-weight:bold; width: 100%; margin-top: 10px; text-decoration: none; display: inline-block; text-align: center; }
        .btn-amazon { background: var(--amazon); color: white; font-size: 1.2rem; }
        .btn-wish { background: #f1f5f9; color: #64748b; }
        .btn-back { background: var(--dark); color: white; width: auto; margin-bottom: 20px; }
        
        .urgency { color: #b91c1c; font-weight: bold; margin: 10px 0; font-size: 0.9rem; }
        .related-grid { display: flex; gap: 15px; overflow-x: auto; padding: 10px 0; }
        .related-card { min-width: 150px; background: #fff; padding: 10px; border-radius: 10px; border: 1px solid #eee; text-align: center; }
        .related-card img { width: 80px; height: 80px; object-fit: contain; }

        .section-title { border-bottom: 2px solid var(--primary); display: inline-block; margin: 30px 0 15px 0; padding-bottom: 5px; }
        .pagination { text-align: center; margin: 30px 0; }
        .page-btn { padding: 10px 20px; background: var(--dark); color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="main-store">
    <header>
        <h1>MS Digital Store</h1>
        <p>Verified Tech Deals & Gadgets</p>
    </header>
    <div class="container">
        <h2 class="section-title">All Products</h2>
        <div class="product-grid" id="products-container"></div>
        <div class="pagination">
            <button class="page-btn" id="prevBtn" onclick="changePage(-1)">Previous</button>
            <span id="pageInfo" style="margin: 0 15px; font-weight: bold;">Page 1</span>
            <button class="page-btn" id="nextBtn" onclick="changePage(1)">Next</button>
        </div>

        <h2 class="section-title">Recently Viewed</h2>
        <div class="related-grid" id="recent-container"></div>
    </div>
</div>

<div id="single-product-page" class="container">
    <button class="btn btn-back" onclick="showStore()">← Back to Store</button>
    <div id="product-content"></div>
    
    <h3 class="section-title">Related Products</h3>
    <div class="related-grid" id="related-container"></div>
</div>

<script>
const products = [
    { id:1, name:"Sony Digital Camera", price:153990, category:"camera", image:"sony camera.jpg.webp", desc:"Professional 4K Mirrorless Camera for high-end photography.", affiliate:"https://amzn.to/4s8VcbX" },
    { id:2, name:"Boat Airbuds", price:2499, category:"audio", image:"airbuds.jpg", desc:"Noise cancelling wireless earbuds with deep bass.", affiliate:"https://amzn.to/3OGT64L" },
    { id:3, name:"Apple AirPods", price:23990, category:"audio", image:" apple airpods.jpg", desc:"Original Apple spatial audio experience.", affiliate:"https://amzn.to/3OBvBKx" },
    { id:4, name:"Charging Cable", price:999, category:"accessories", image:"charge.jpg", desc:"Type-C to Type-C 100W fast charging.", affiliate:"https://amzn.to/4rFiTsz" },
    { id:5, name:"HP Laptop", price:68990, category:"laptop", image:"hp laptop.jpg", desc:"High performance laptop for gaming and work.", affiliate:"https://amzn.to/4aI8Q04" },
    { id:6, name:"Counter Machine", price:15998, category:"computer", image:"counter.jpg ", desc:"Precise currency counting for business.", affiliate:"https://amzn.to/4aGM4Wl" },
    { id:7, name:"SanDisk Pen Drive", price:2100, category:"computer", image:" sandisk 1.jpg ", desc:"128GB High speed data transfer.", affiliate:"https://amzn.to/46wnd52" },
    { id:8, name:"Canon EOS R50", price:64990, category:"camera", image:" canon.jpg", desc:"Vlogging special mirrorless camera.", affiliate:"https://amzn.to/4bcVp8l" },
    { id:9, name:"boAt Nirvana Crown", price:2799, category:"audio", image:"boats airbords.jpg", desc:"Premium ANC headphones.", affiliate:"https://amzn.to/400HZ9m" },
    { id:10, name:"Amazfit Active Max", price:15999, category:"watch", image:"smart watch.jpg", desc:"GPS tracking and AMOLED display.", affiliate:"https://amzn.to/4cmxWms" },
    { id:11, name:"KENT RO Purifier", price:22200, category:"smart", image:"A.jpg ", desc:"Clean water with 6-stage purification.", affiliate:"https://amzn.to/4ckumJx" },
    { id:12, name:"Samsung Smart Monitor", price:32999, category:"computer", image:"B.jpg ", desc:"High resolution smart display.", affiliate:"https://amzn.to/3P9GCTl" },
    { id:13, name:"Noise Pro 6R", price:6999, category:"watch", image:" c.jpg ", desc:"Sports smart watch with calling.", affiliate:"https://amzn.to/3P914nm" },
    { id:14, name:"GUESS Luxury Watch", price:16995, category:"watch", image:"d.jpg", desc:"Designer watch for men.", affiliate:"https://amzn.to/4saLOEW" },
    { id:15, name:"Antique Wall Clock", price:699, category:"smart", image:"e.jpg ", desc:"Decorative wall clock for home.", affiliate:"https://amzn.to/4u52MGn" },
    { id:16, name:"Fire Boltt Gaming TWS", price:799, category:"audio", image:"f.jpg", desc:"Ultra low latency gaming buds.", affiliate:"https://amzn.to/4tXBtxH" },
    { id:17, name:"Metal Laptop Stand", price:497, category:"laptop", image:" g.jpg ", desc:"Ergonomic foldable stand.", affiliate:"https://amzn.to/3OFZycl" },
    { id:18, name:"Sony Alpha 6100", price:72499, category:"camera", image:"aa.jpg", desc:"Advanced autofocus camera.", affiliate:"https://amzn.to/40EuCvG" },
    { id:19, name:"IZI Pocket Gimbal", price:24499, category:"camera", image:"aaa.jpg ", desc:"Handheld stabilizer camera.", affiliate:"https://amzn.to/4rMp7qQ" }
];

let currentPage = 1;
const pPerPage = 8;
let recentlyViewed = JSON.parse(localStorage.getItem('recent')) || [];
let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];

function showStore() {
    document.getElementById('main-store').style.display = 'block';
    document.getElementById('single-product-page').style.display = 'none';
    window.scrollTo(0,0);
}

function openProduct(id) {
    const p = products.find(x => x.id === id);
    if(!p) return;

    // Save to Recently Viewed
    if(!recentlyViewed.includes(id)) {
        recentlyViewed.unshift(id);
        if(recentlyViewed.length > 6) recentlyViewed.pop();
        localStorage.setItem('recent', JSON.stringify(recentlyViewed));
    }

    // Analytics
    gtag('event', 'view_item', { 'item_name': p.name });

    document.getElementById('main-store').style.display = 'none';
    const page = document.getElementById('single-product-page');
    page.style.display = 'block';

    const stock = Math.floor(Math.random() * 8) + 2; // Urgency

    document.getElementById('product-content').innerHTML = `
        <div class="product-layout">
            <div class="product-image-box">
                <img src="${p.image}" alt="${p.name}">
            </div>
            <div class="product-info-box">
                <h1>${p.name}</h1>
                <p class="price">₹${p.price.toLocaleString('en-IN')}</p>
                <p class="urgency">🔥 Only ${stock} items left in stock - order soon.</p>
                <hr>
                <p><strong>About this item:</strong><br>${p.desc}</p>
                <a href="${p.affiliate}" target="_blank" class="btn btn-amazon" onclick="gtag('event', 'click_amazon', {'name': '${p.name}'})">Buy on Amazon</a>
                <button class="btn btn-wish" onclick="toggleWish(${p.id})">❤ Add to Wishlist</button>
            </div>
        </div>
    `;

    // Related Products
    const related = products.filter(x => x.category === p.category && x.id !== p.id).slice(0, 4);
    document.getElementById('related-container').innerHTML = related.map(r => `
        <div class="related-card" onclick="openProduct(${r.id})">
            <img src="${r.image}">
            <p style="font-size:12px; margin:5px 0;">₹${r.price.toLocaleString('en-IN')}</p>
        </div>
    `).join('');

    window.scrollTo(0,0);
}

function displayMain() {
    const start = (currentPage - 1) * pPerPage;
    const paginated = products.slice(start, start + pPerPage);
    
    document.getElementById('products-container').innerHTML = paginated.map(p => `
        <div class="card" onclick="openProduct(${p.id})">
            <img src="${p.image}" alt="${p.name}">
            <h3>${p.name}</h3>
            <p class="price">₹${p.price.toLocaleString('en-IN')}</p>
            <p style="color:blue; font-size:12px;">View Details</p>
        </div>
    `).join('');

    document.getElementById('pageInfo').innerText = `Page ${currentPage}`;
    document.getElementById('prevBtn').disabled = currentPage === 1;
    document.getElementById('nextBtn').disabled = start + pPerPage >= products.length;

    // Load Recently Viewed on main page
    const recentItems = products.filter(x => recentlyViewed.includes(x.id));
    document.getElementById('recent-container').innerHTML = recentItems.map(r => `
        <div class="related-card" onclick="openProduct(${r.id})">
            <img src="${r.image}">
            <p style="font-size:11px;">${r.name.substring(0,15)}...</p>
        </div>
    `).join('');
}

function changePage(step) {
    currentPage += step;
    displayMain();
    window.scrollTo(0,0);
}

function toggleWish(id) {
    if(!wishlist.includes(id)) {
        wishlist.push(id);
        localStorage.setItem('wishlist', JSON.stringify(wishlist));
        alert("Product added to wishlist! ❤️");
    } else {
        alert("Already in wishlist!");
    }
}

// Start
displayMain();
</script>

</body>
</html>
